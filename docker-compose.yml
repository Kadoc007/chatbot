version: '3.8'

services:
  firebase:
    image: node:20
    container_name: firebase_emulator
    working_dir: /app   # 🔥 ใช้ root project
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - ./functions/.env
    command: >
      sh -c "
        npm install -g firebase-tools &&
        cd functions &&
        npm install &&
        cd .. &&
        firebase emulators:start --only functions --project chatbotit-6cd6d --host 0.0.0.0 --inspect-functions --log-verbosity DEBUG
      "
    ports:
      - "4000:4000"
      - "5001:5001"
      - "9229:9229"
    environment:
      - DEBUG=*
      - FUNCTIONS_EMULATOR_TIMEOUT_SECONDS=120
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    depends_on:
      - firebase
    command: http firebase:5001
    env_file:
      - ./.env
    ports:
      - "4040:4040"
    restart: unless-stopped
